<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 240px; padding: 16px;
      background: #111; color: #e8eaed;
    }
    .logo { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #9aa0a6; }
    .status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 8px;
      background: #1e1e1e; border: 1px solid #333;
    }
    .dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
      background: #9aa0a6;
    }
    .dot.connected { background: #34a853; box-shadow: 0 0 6px #34a85388; }
    .dot.connecting { background: #f29900; animation: blink 1s infinite; }
    .status-text { font-size: 13px; font-weight: 500; }
    .user { font-size: 11px; color: #9aa0a6; margin-top: 2px; }
    .open-btn {
      margin-top: 12px; width: 100%; padding: 8px;
      background: #1a73e8; color: white; border: none;
      border-radius: 6px; font-size: 13px; cursor: pointer;
    }
    .open-btn:hover { background: #1557b0; }
    @keyframes blink { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="logo">🎓 Secretário Escolar</div>
  <div class="status">
    <div class="dot connecting" id="dot"></div>
    <div>
      <div class="status-text" id="statusText">Conectando...</div>
      <div class="user" id="userText"></div>
    </div>
  </div>
  <button class="open-btn" id="openBtn">Abrir site</button>
  <script src="popup.js"></script>
</body>
</html>
